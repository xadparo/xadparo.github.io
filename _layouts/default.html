<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'ko' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#0f1115">
    <title>
      {%- if page.title -%}
        {{ page.title }} | {{ site.title }}
      {%- else -%}
        {{ site.title }}
      {%- endif -%}
    </title>
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
      html {
        background: #0f1115;
        color: #f3ede3;
        color-scheme: dark;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at top left, rgba(189, 88, 52, 0.2), transparent 28%),
          linear-gradient(180deg, #16191f 0%, #0f1115 100%);
        color: #f3ede3;
      }
    </style>
    <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
    <link rel="alternate" type="application/atom+xml" title="{{ site.title | escape }}" href="{{ '/feed.xml' | relative_url }}">
  </head>
  <body class="{{ page.body_class | default: '' }}">
    <div class="site-shell">
      <div class="site-frame">
        {%- include sidebar.html -%}
        <main class="site-content" aria-label="Content">
          {{ content }}
        </main>
      </div>
    </div>
  </body>
</html>
